<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarjetas Digitales de Presentación</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background-image:url('https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80');
background-size:cover;
background-attachment:fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:40px;
}

h1{
text-align:center;
font-size:45px;
}

.subtitle{
text-align:center;
opacity:0.9;
margin-bottom:40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
max-width:1100px;
margin:auto;
margin-top:40px;
}

/* NODALES GLASS */

.node{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:12px;
padding:25px;
text-align:center;
backdrop-filter:blur(6px);
transition:0.3s;
}

.node:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.15);
}

.node img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#00ff88;
font-weight:bold;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
padding:30px;
backdrop-filter:blur(6px);
text-align:center;
width:320px;
}

.modal img{
width:90px;
height:90px;
border-radius:50%;
}

.actions{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.actions a{
padding:10px 14px;
border-radius:8px;
color:white;
text-decoration:none;
}

.call{background:#007bff}
.whatsapp{background:#25D366}
.mail{background:#ff4444}
.map{background:#ff8800}
.web{background:#444}

.close{
margin-top:20px;
background:#ff4444;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="overlay">

<h1><i class="fa-solid fa-id-card"></i> Tarjetas Digitales de Presentación</h1>

<p class="subtitle">
Ejemplos de tarjetas digitales interactivas
</p>

<div class="grid">

<!-- DEMO 1 -->

<div class="node">

<img src="https://randomuser.me/api/portraits/men/32.jpg">

<h3>Juan Pérez</h3>

<p>Asesor Inmobiliario</p>

<button onclick="abrir('demo1')">Ver demo</button>

</div>

<!-- DEMO 2 -->

<div class="node">

<img src="https://randomuser.me/api/portraits/women/44.jpg">

<h3>María López</h3>

<p>Diseñadora Gráfica</p>

<button onclick="abrir('demo2')">Ver demo</button>

</div>

<!-- DEMO 3 -->

<div class="node">

<img src="https://randomuser.me/api/portraits/men/52.jpg">

<h3>Carlos Ramírez</h3>

<p>Consultor de Negocios</p>

<button onclick="abrir('demo3')">Ver demo</button>

</div>

</div>

</div>

<!-- MODAL DEMO -->

<div class="modal" id="modal">

<div class="modal-content" id="contenido"></div>

</div>

<script>

function abrir(demo){

let contenido=document.getElementById("contenido")

if(demo=="demo1"){

contenido.innerHTML=`

<img src="https://randomuser.me/api/portraits/men/32.jpg">

<h3>Juan Pérez</h3>

<p>Asesor Inmobiliario</p>

<div class="actions">

<a class="call" href="tel:5512345678"><i class="fa-solid fa-phone"></i></a>

<a class="whatsapp" href="https://wa.me/5215512345678"><i class="fa-brands fa-whatsapp"></i></a>

<a class="mail" href="mailto:juan@email.com"><i class="fa-solid fa-envelope"></i></a>

<a class="map" href="https://maps.google.com"><i class="fa-solid fa-location-dot"></i></a>

<a class="web" href="#"><i class="fa-solid fa-globe"></i></a>

</div>

<button class="close" onclick="cerrar()">Cerrar</button>

`

}

if(demo=="demo2"){

contenido.innerHTML=`

<img src="https://randomuser.me/api/portraits/women/44.jpg">

<h3>María López</h3>

<p>Diseñadora Gráfica</p>

<div class="actions">

<a class="call" href="#"><i class="fa-solid fa-phone"></i></a>

<a class="whatsapp" href="#"><i class="fa-brands fa-whatsapp"></i></a>

<a class="mail" href="#"><i class="fa-solid fa-envelope"></i></a>

<a class="map" href="#"><i class="fa-solid fa-location-dot"></i></a>

<a class="web" href="#"><i class="fa-solid fa-globe"></i></a>

</div>

<button class="close" onclick="cerrar()">Cerrar</button>

`

}

if(demo=="demo3"){

contenido.innerHTML=`

<img src="https://randomuser.me/api/portraits/men/52.jpg">

<h3>Carlos Ramírez</h3>

<p>Consultor de Negocios</p>

<div class="actions">

<a class="call" href="#"><i class="fa-solid fa-phone"></i></a>

<a class="whatsapp" href="#"><i class="fa-brands fa-whatsapp"></i></a>

<a class="mail" href="#"><i class="fa-solid fa-envelope"></i></a>

<a class="map" href="#"><i class="fa-solid fa-location-dot"></i></a>

<a class="web" href="#"><i class="fa-solid fa-globe"></i></a>

</div>

<button class="close" onclick="cerrar()">Cerrar</button>

`

}

document.getElementById("modal").style.display="flex"

}

function cerrar(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
