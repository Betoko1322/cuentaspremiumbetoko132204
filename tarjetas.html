<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarjetas Digitales de Presentación</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background-image:url('https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80');
background-size:cover;
background-attachment:fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:40px;
}

h1{
text-align:center;
font-size:45px;
}

.subtitle{
text-align:center;
opacity:0.9;
margin-bottom:40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
max-width:1200px;
margin:auto;
margin-top:40px;
}

/* NODALES GLASS */

.node{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:12px;
padding:25px;
text-align:center;
backdrop-filter:blur(6px);
transition:0.3s;
}

.node:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.15);
}

.node img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#00ff88;
font-weight:bold;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
padding:30px;
backdrop-filter:blur(6px);
text-align:center;
width:320px;
}

.modal img{
width:90px;
height:90px;
border-radius:50%;
}

.actions{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.actions a{
padding:10px 14px;
border-radius:8px;
color:white;
text-decoration:none;
}

.call{background:#007bff}
.whatsapp{background:#25D366}
.mail{background:#ff4444}
.map{background:#ff8800}
.web{background:#444}

.close{
margin-top:20px;
background:#ff4444;
}

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<div class="overlay">

<h1><i class="fa-solid fa-id-card"></i> Tarjetas Digitales de Presentación</h1>

<p class="subtitle">
Ejemplos de tarjetas digitales interactivas
</p>

<div class="grid">

<!-- MINI DONITAS -->

<div class="node">
<img src="https://images.unsplash.com/photo-1509440159596-0249088772ff">
<h3>Mini Donitas</h3>
<p>Repostería artesanal</p>
<button onclick="window.open('demo-donitas.html','_blank')">Ver demo</button>
</div>

<!-- PSICOLOGO -->

<div class="node">
<img src="https://randomuser.me/api/portraits/men/45.jpg">
<h3>Psicólogo</h3>
<p>Terapia emocional</p>
<button onclick="window.open('demo-donitas.html','_blank')">Ver demo</button>
</div>

<!-- ABOGADO -->

<div class="node">
<img src="https://randomuser.me/api/portraits/men/32.jpg">
<h3>Abogado</h3>
<p>Consultoría legal</p>
<button onclick="window.open('demo-donitas.html','_blank')">Ver demo</button>
</div>

<!-- DENTISTA -->

<div class="node">
<img src="https://randomuser.me/api/portraits/women/65.jpg">
<h3>Dentista</h3>
<p>Salud dental</p>
<button onclick="window.open('demo-donitas.html','_blank')">Ver demo</button>
</div>

<!-- GINECOLOGA -->

<div class="node">
<img src="https://randomuser.me/api/portraits/women/44.jpg">
<h3>Doctora Ginecóloga</h3>
<p>Salud femenina</p>
<button onclick="window.open('demo-donitas.html','_blank')">Ver demo</button>
</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">
<div class="modal-content" id="contenido"></div>
</div>

<script>

function abrir(tipo){

let contenido=document.getElementById("contenido")

let datos={

donitas:{
img:"https://images.unsplash.com/photo-1509440159596-0249088772ff",
nombre:"Mini Donitas",
cargo:"Repostería artesanal"
},

psicologo:{
img:"https://randomuser.me/api/portraits/men/45.jpg",
nombre:"Dr. Carlos Ruiz",
cargo:"Psicólogo clínico"
},

abogado:{
img:"https://randomuser.me/api/portraits/men/32.jpg",
nombre:"Lic. Juan Pérez",
cargo:"Abogado"
},

dentista:{
img:"https://randomuser.me/api/portraits/women/65.jpg",
nombre:"Dra. Laura Gómez",
cargo:"Dentista"
},

ginecologa:{
img:"https://randomuser.me/api/portraits/women/44.jpg",
nombre:"Dra. María López",
cargo:"Ginecóloga"
}

}

let d=datos[tipo]

contenido.innerHTML=`

<img src="${d.img}">

<h3>${d.nombre}</h3>

<p>${d.cargo}</p>

<div class="actions">

<a class="call" href="#"><i class="fa-solid fa-phone"></i></a>

<a class="whatsapp" href="#"><i class="fa-brands fa-whatsapp"></i></a>

<a class="mail" href="#"><i class="fa-solid fa-envelope"></i></a>

<a class="map" href="#"><i class="fa-solid fa-location-dot"></i></a>

<a class="web" href="#"><i class="fa-solid fa-globe"></i></a>

</div>

<button class="close" onclick="cerrar()">Cerrar</button>

`

document.getElementById("modal").style.display="flex"

}

function cerrar(){

document.getElementById("modal").style.display="none"

}

</script>

</body>
</html>
