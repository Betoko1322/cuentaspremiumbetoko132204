<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarjetas Digitales</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background-image:url('https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80');
background-size:cover;
background-attachment:fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:40px;
}

h1{
text-align:center;
}

/* NODALES GLASS */

.panel{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:12px;
padding:25px;
backdrop-filter:blur(6px);
}

.simulator{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-top:40px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
}

/* TARJETA */

.card{
margin-top:20px;
padding:30px;
border-radius:15px;
background:#00eaff;
color:black;
text-align:center;
}

.card img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.actions{
margin-top:20px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.actions a{
padding:10px 14px;
border-radius:8px;
color:white;
text-decoration:none;
font-size:18px;
}

.call{background:#007bff}
.whatsapp{background:#25D366}
.mail{background:#ff4444}
.map{background:#ff8800}
.web{background:#444}

/* BOTON */

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#00ff88;
font-weight:bold;
cursor:pointer;
}

@media(max-width:900px){

.simulator{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="overlay">

<h1><i class="fa-solid fa-id-card"></i> Tarjeta Digital Interactiva</h1>

<div class="simulator">

<div class="panel">

<label>Foto / Logo</label>
<input type="file" id="foto">

<label>Nombre</label>
<input id="nombre">

<label>Profesión / Empresa</label>
<input id="cargo">

<label>Teléfono</label>
<input id="telefono">

<label>Correo</label>
<input id="correo">

<label>WhatsApp</label>
<input id="whatsapp">

<label>Ubicación Google Maps (link)</label>
<input id="mapa">

<label>Sitio web</label>
<input id="web">

<label>Color tarjeta</label>
<input type="color" id="color">

<button onclick="generar()">Actualizar tarjeta</button>

</div>

<div class="panel">

<h3>Vista previa</h3>

<div class="card" id="card">

<img id="fotoPreview" src="https://via.placeholder.com/90">

<h3 id="pNombre">Nombre</h3>

<p id="pCargo">Profesión</p>

<div class="actions">

<a id="btnCall" class="call"><i class="fa-solid fa-phone"></i></a>

<a id="btnWhatsapp" class="whatsapp"><i class="fa-brands fa-whatsapp"></i></a>

<a id="btnMail" class="mail"><i class="fa-solid fa-envelope"></i></a>

<a id="btnMap" class="map"><i class="fa-solid fa-location-dot"></i></a>

<a id="btnWeb" class="web"><i class="fa-solid fa-globe"></i></a>

</div>

</div>

</div>

</div>

</div>

<script>

function generar(){

let nombre=document.getElementById("nombre").value
let cargo=document.getElementById("cargo").value
let tel=document.getElementById("telefono").value
let correo=document.getElementById("correo").value
let whatsapp=document.getElementById("whatsapp").value
let mapa=document.getElementById("mapa").value
let web=document.getElementById("web").value
let color=document.getElementById("color").value

document.getElementById("pNombre").innerText=nombre
document.getElementById("pCargo").innerText=cargo

document.getElementById("card").style.background=color

document.getElementById("btnCall").href="tel:"+tel
document.getElementById("btnWhatsapp").href="https://wa.me/"+whatsapp
document.getElementById("btnMail").href="mailto:"+correo
document.getElementById("btnMap").href=mapa
document.getElementById("btnWeb").href=web

}

/* FOTO */

document.getElementById("foto").addEventListener("change",function(){

let reader=new FileReader()

reader.onload=function(e){

document.getElementById("fotoPreview").src=e.target.result

}

reader.readAsDataURL(this.files[0])

})

</script>

</body>
</html>
