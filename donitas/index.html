<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calculadora de Costos - Donitas</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff7a00">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{

font-family:Arial;

background-image:url("https://img.freepik.com/foto-gratis/monton-donas-multicolores-mesa-madera-rustica-generada-ia_188544-35446.jpg");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

}

#app{

width:420px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(12px);

border-radius:16px;

padding:25px;

color:white;

box-shadow:0 10px 40px rgba(0,0,0,0.3);

}

h2{
text-align:center;
margin-top:0;
}

.section-title{
margin-top:20px;
font-size:18px;
}

.card{

background:rgba(255,255,255,0.15);

border-radius:10px;

padding:12px;

margin-top:10px;

}

label{
display:block;
font-size:14px;
margin-top:6px;
}

input{

width:100%;

padding:8px;

border-radius:6px;

border:none;

margin-top:4px;

}

button{

width:100%;

padding:12px;

margin-top:15px;

background:#ff7a00;

border:none;

border-radius:8px;

color:white;

font-size:16px;

cursor:pointer;

}

.result{

margin-top:10px;

background:rgba(255,255,255,0.15);

padding:10px;

border-radius:8px;

}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<div id="app">

<h2>Calculadora de Costos</h2>

<div class="section-title">Ingredientes</div>

<div class="card">

<label>Harina - precio por kilo</label> <input id="harinaPrecio">

<label>Cantidad utilizada (gramos)</label> <input id="harinaUso">

</div>

<div class="card">

<label>Huevos - precio por docena</label> <input id="huevoPrecio">

<label>Huevos utilizados</label> <input id="huevoUso">

</div>

<div class="card">

<label>Aceite - precio del litro</label> <input id="aceitePrecio">

<label>Cantidad utilizada (ml)</label> <input id="aceiteUso">

</div>

<div class="section-title">Costos de producción</div>

<div class="card">

<label>Mano de obra</label> <input id="mano">

<label>Gas</label> <input id="gas">

<label>Electricidad</label> <input id="electricidad">

</div>

<div class="section-title">Producción</div>

<div class="card">

<label>Cantidad de donitas producidas</label> <input id="cantidad">

<label>Ganancia deseada (%)</label> <input id="ganancia">

</div>

<button onclick="calcular()">Calcular</button>

<div class="result">
Costo total: $ <span id="total"></span>
</div>

<div class="result">
Costo por donita: $ <span id="costo"></span>
</div>

<div class="result">
Precio sugerido: $ <span id="precio"></span>
</div>

<canvas id="grafica"></canvas>

</div>

<script>

function calcular(){

let harinaPrecio = Number(document.getElementById("harinaPrecio").value) || 0;
let harinaUso = Number(document.getElementById("harinaUso").value) || 0;

let huevoPrecio = Number(document.getElementById("huevoPrecio").value) || 0;
let huevoUso = Number(document.getElementById("huevoUso").value) || 0;

let aceitePrecio = Number(document.getElementById("aceitePrecio").value) || 0;
let aceiteUso = Number(document.getElementById("aceiteUso").value) || 0;

let mano = Number(document.getElementById("mano").value) || 0;
let gas = Number(document.getElementById("gas").value) || 0;
let electricidad = Number(document.getElementById("electricidad").value) || 0;

let cantidad = Number(document.getElementById("cantidad").value) || 1;
let ganancia = Number(document.getElementById("ganancia").value) || 0;

/* COSTO DE INGREDIENTES */

let costoHarina = (harinaPrecio / 1000) * harinaUso;
let costoHuevo = (huevoPrecio / 12) * huevoUso;
let costoAceite = (aceitePrecio / 1000) * aceiteUso;

let costoIngredientes = costoHarina + costoHuevo + costoAceite;

/* COSTO TOTAL */

let costoTotal = costoIngredientes + mano + gas + electricidad;

/* COSTO POR DONITA */

let costoDonita = costoTotal / cantidad;

/* PRECIO CON GANANCIA */

let precio = costoDonita * (1 + ganancia / 100);

/* MOSTRAR RESULTADOS */

document.getElementById("total").innerText = costoTotal.toFixed(2);
document.getElementById("costo").innerText = costoDonita.toFixed(2);
document.getElementById("precio").innerText = precio.toFixed(2);

/* GRAFICA */

new Chart(document.getElementById("grafica"),{
type:"pie",
data:{
labels:["Costo","Ganancia"],
datasets:[{
data:[costoDonita, precio - costoDonita]
}]
}
});

}

/* PWA */

if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>

</html>
