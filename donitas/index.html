<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calculadora Mini Donitas</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff7a00">

<style>

body{
font-family:Arial;
background-image:url("https://img.freepik.com/foto-gratis/monton-donas-multicolores-mesa-madera-rustica-generada-ia_188544-35446.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{
width:400px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
color:white;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#ff7a00;
color:white;
font-size:16px;
margin-top:10px;
}

.resultado{
margin-top:10px;
background:rgba(255,255,255,0.2);
padding:8px;
border-radius:8px;
}

</style>

</head>

<body>

<div id="app">

<h2>🍩 Calculadora Donitas</h2>

<input id="harina" placeholder="Harina">

<input id="azucar" placeholder="Azúcar">

<input id="aceite" placeholder="Aceite">

<input id="huevos" placeholder="Huevos">

<input id="topping" placeholder="Topping">

<input id="mano" placeholder="Mano de obra">

<input id="gas" placeholder="Gas">

<input id="electricidad" placeholder="Electricidad">

<input id="cantidad" placeholder="Donitas producidas">

<input id="ganancia" placeholder="Ganancia %">

<button onclick="calcular()">Calcular</button>

<div class="resultado">
Costo total: $ <span id="total"></span>
</div>

<div class="resultado">
Precio por donita: $ <span id="precio"></span>
</div>

</div>

<script>

function calcular(){

let harina=Number(document.getElementById("harina").value)||0
let azucar=Number(document.getElementById("azucar").value)||0
let aceite=Number(document.getElementById("aceite").value)||0
let huevos=Number(document.getElementById("huevos").value)||0
let topping=Number(document.getElementById("topping").value)||0

let mano=Number(document.getElementById("mano").value)||0
let gas=Number(document.getElementById("gas").value)||0
let electricidad=Number(document.getElementById("electricidad").value)||0

let cantidad=Number(document.getElementById("cantidad").value)||1
let ganancia=Number(document.getElementById("ganancia").value)||0

let costo=harina+azucar+aceite+huevos+topping+mano+gas+electricidad

let porDonita=costo/cantidad

let precio=porDonita*(1+ganancia/100)

document.getElementById("total").innerText=costo.toFixed(2)
document.getElementById("precio").innerText=precio.toFixed(2)

}

</script>

</body>

</html>
