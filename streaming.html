<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataformas Streaming Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--neon-blue:#00f7ff;
--neon-green:#00ffb3;
}

/* ===== FONDO ===== */
body{
margin:0;
font-family:'Poppins',sans-serif;
color:#fff;
background:url("https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80") no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:-1;
}

/* ===== BOTÓN REGRESAR ===== */
.backBtn{
position:fixed;
top:20px;
left:20px;
padding:10px 18px;
border-radius:25px;
text-decoration:none;
font-weight:600;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
color:#000;
z-index:10;
transition:.3s;
}
.backBtn:hover{
transform:scale(1.1);
}

/* ===== HEADER ===== */
.headerSection{
text-align:center;
margin:80px auto 40px auto;
padding:35px;
max-width:1000px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.3);
}

.headerSection h1{
font-size:2.3rem;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
-webkit-background-clip:text;
color:transparent;
}

.headerSection p{
opacity:.9;
margin-top:10px;
}

/* ===== GRID ===== */
#streamingSection{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
max-width:1200px;
margin:auto;
padding:20px;
}

@media(max-width:900px){
#streamingSection{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
#streamingSection{
grid-template-columns:1fr;
}
}

/* ===== CARDS ===== */
.streamingCard{
padding:20px;
border-radius:22px;
text-align:center;
transition:.4s ease;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.25);
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:320px;
position:relative;
}

.streamingCard:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 40px rgba(0,255,200,.5);
}

.streamingCard img{
width:100%;
height:180px;
border-radius:15px;
object-fit:cover;
}

.streamingCard h3{
margin-top:15px;
font-size:1.1rem;
min-height:30px;
display:flex;
align-items:center;
justify-content:center;
}

/* ===== BADGE ESTADO ===== */
.statusBadge{
position:absolute;
top:12px;
right:12px;
padding:5px 12px;
border-radius:20px;
font-size:.75rem;
font-weight:600;
color:#fff;
}

.disponible{background:#00c853;}
.poca{background:#ff9800;}
.pedido{background:#00bcd4;}
.agotado{background:#ff3d3d;}

/* BOTÓN */
.infoBtn{
margin-top:auto;
padding:10px 16px;
border:none;
border-radius:25px;
cursor:pointer;
font-weight:600;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
color:#000;
transition:.3s;
}
.infoBtn:hover{
transform:scale(1.08);
}

/* ===== MODAL ===== */
#mainModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
justify-content:center;
align-items:center;
opacity:0;
transition:.3s;
}

#mainModal.active{
display:flex;
opacity:1;
}

.modalContent{
width:380px;
max-width:90%;
padding:30px;
border-radius:25px;
text-align:center;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.3);
transform:scale(.8);
opacity:0;
transition:.3s ease;
}

#mainModal.active .modalContent{
transform:scale(1);
opacity:1;
}

.modalContent img{
width:100%;
height:200px;
border-radius:15px;
object-fit:cover;
margin-bottom:15px;
}

.whatsappBtn{
display:inline-block;
margin-top:15px;
padding:12px 22px;
border-radius:30px;
background:#25D366;
color:#fff;
text-decoration:none;
font-weight:600;
}

.closeBtn{
margin-top:15px;
padding:8px 15px;
border:none;
border-radius:20px;
cursor:pointer;
background:#ff4d4d;
color:#fff;
}
</style>
</head>

<body>

<a href="index.html" class="backBtn">← Regresar</a>

<div class="headerSection">
<h1>Plataformas Streaming Premium</h1>
<p>Elige tu plataforma favorita y contrata al mejor precio.</p>
</div>

<section id="streamingSection">

<!-- FILA 1 -->
  
<div class="streamingCard" data-status="poca" data-name="Netflix" data-price="$150 MXN" data-duration="1 Mes" data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNMU2VI-2LG8thKFWx2VG8L5QT7uDTiZnoJQ&s">
<span class="statusBadge"></span>
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNMU2VI-2LG8thKFWx2VG8L5QT7uDTiZnoJQ&s">
<h3>Netflix</h3>
<button class="infoBtn" onclick="openModal(this)">Más información</button>
</div>

<div class="streamingCard" data-status="disponible" data-name="HBO Max" data-price="$80 MXN" data-duration="1 Mes" data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAtd_npASz3Cp90pcd5GXu4mdzhotFUlp5sQ&s">
<span class="statusBadge"></span>
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAtd_npASz3Cp90pcd5GXu4mdzhotFUlp5sQ&s">
<h3>HBO Max</h3>
<button class="infoBtn">Más información</button>
</div>

<div class="streamingCard" data-status="pedido" data-name="ViX+" data-price="$80 MXN" data-duration="1 Mes" data-img="https://corporate.televisaunivision.com/wp-content/uploads/sites/5/2022/06/ViX_logo.jpg?w=1024">
<span class="statusBadge"></span>
<img src="https://corporate.televisaunivision.com/wp-content/uploads/sites/5/2022/06/ViX_logo.jpg?w=1024">
<h3>ViX+</h3>
<button class="infoBtn">Más información</button>
</div>

<div class="streamingCard" data-status="agotado" data-name="Paramount+" data-price="$80 MXN" data-duration="1 Mes" data-img="https://zoomf7.net/wp-content/uploads/2021/05/paramount-plus-estrenos.jpg">
<span class="statusBadge"></span>
<img src="https://zoomf7.net/wp-content/uploads/2021/05/paramount-plus-estrenos.jpg">
<h3>Paramount+</h3>
<button class="infoBtn">Más información</button>
</div>

<!-- FILA 2 -->

<div class="streamingCard" data-status="disponible" data-name="Disney+" data-price="$150 MXN" data-duration="1 Mes" data-img="https://i.blogs.es/b80cc9/disney/840_560.jpeg">
<span class="statusBadge"></span>
<img src="https://i.blogs.es/b80cc9/disney/840_560.jpeg">
<h3>Disney+</h3>
<button class="infoBtn" onclick="openModal(this)">Más información</button>
</div>

<div class="streamingCard" data-status="disponible" data-name="Spotify" data-price="$90 MXN" data-duration="1 Mes" data-img="https://imagenes.20minutos.es/files/image_1920_1080/files/fp/uploads/imagenes/2021/08/04/spotify-plus.r_d.600-300.jpeg">
<span class="statusBadge"></span>
<img src="https://imagenes.20minutos.es/files/image_1920_1080/files/fp/uploads/imagenes/2021/08/04/spotify-plus.r_d.600-300.jpeg">
<h3>Spotify</h3>
<button class="infoBtn" onclick="openModal(this)">Más información</button>
</div>

<div class="streamingCard" data-status="poca" data-name="Crunchyroll" data-price="$80 MXN" data-duration="1 Mes" data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSNpAXwyU9etmrcGzx1UiXXNuWX0_hswSXDyQ&s">
<span class="statusBadge"></span>
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSNpAXwyU9etmrcGzx1UiXXNuWX0_hswSXDyQ&s">
<h3>Crunchyroll</h3>
<button class="infoBtn" onclick="openModal(this)">Más información</button>
</div>

<div class="streamingCard" data-status="disponible" data-name="YouTube Premium" data-price="$90 MXN" data-duration="1 Mes" data-img="https://st5.depositphotos.com/3930295/67677/i/450/depositphotos_676772690-stock-photo-youtube-premium-social-media-images.jpg">
<span class="statusBadge"></span>
<img src="https://st5.depositphotos.com/3930295/67677/i/450/depositphotos_676772690-stock-photo-youtube-premium-social-media-images.jpg">
<h3>YouTube Premium</h3>
<button class="infoBtn" onclick="openModal(this)">Más información</button>
</div>

<!-- FILA 3 -->

<div class="streamingCard" data-status="disponible" data-name="Prime Video Con Anuncios" data-price="$80 MXN" data-duration="1 Mes" data-img="https://m.media-amazon.com/images/G/01/primevideo/seo/primevideo-seo-logo.png">
<span class="statusBadge"></span>
<img src="https://m.media-amazon.com/images/G/01/primevideo/seo/primevideo-seo-logo.png">
<h3>Prime Video Con Anuncios</h3>
<button class="infoBtn" onclick="openModal(this)">Más información</button>
</div>

<div class="streamingCard" data-status="disponible" data-name="Prime Video Sin Anuncios" data-price="$110 MXN" data-duration="1 Mes" data-img="https://m.media-amazon.com/images/G/01/primevideo/seo/primevideo-seo-logo.png">
<span class="statusBadge"></span>
<img src="https://m.media-amazon.com/images/G/01/primevideo/seo/primevideo-seo-logo.png">
<h3>Prime Video Sin Anuncios</h3>
<button class="infoBtn" onclick="openModal(this)">Más información</button>
</div>
  
</section>

<!-- MODAL -->
<div id="mainModal">
<div class="modalContent">
<img id="modalImage">
<h2 id="modalTitle"></h2>
<p id="modalPrice"></p>
<p id="modalDuration"></p>
<a id="whatsappLink" target="_blank" class="whatsappBtn">Contratar por WhatsApp</a>
<br>
<button class="closeBtn" onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>

function openModal(button){
const card = button.closest(".streamingCard");

document.getElementById("modalTitle").innerText=card.dataset.name;
document.getElementById("modalPrice").innerText=card.dataset.price;
document.getElementById("modalDuration").innerText="Duración: "+card.dataset.duration;
document.getElementById("modalImage").src=card.dataset.img;

const msg=`Hola, quiero contratar ${card.dataset.name}`;
document.getElementById("whatsappLink").href=`https://wa.me/5536509109?text=${encodeURIComponent(msg)}`;

document.getElementById("mainModal").classList.add("active");
}

function closeModal(){
document.getElementById("mainModal").classList.remove("active");
}

document.getElementById("mainModal").addEventListener("click",function(e){
if(e.target===this){
closeModal();
}
});

/* BADGE ESTADOS */

document.querySelectorAll(".streamingCard").forEach(card=>{

const status = card.dataset.status;
const badge = card.querySelector(".statusBadge");

if(status==="disponible"){
badge.innerText="Disponible";
badge.classList.add("disponible");
}

if(status==="poca"){
badge.innerText="Poca disponibilidad";
badge.classList.add("poca");
}

if(status==="pedido"){
badge.innerText="Sobre pedido";
badge.classList.add("pedido");
}

if(status==="agotado"){
badge.innerText="Agotado";
badge.classList.add("agotado");
}

});

</script>

</body>
</html>
