<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataformas Streaming | DigitalPro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

:root{
  --bg:#0b1120;
  --card:#1e293b;
  --text:#f1f5f9;
  --neon-blue:#00f3ff;
  --neon-green:#00ff9d;
  --gold:#facc15;
  --warning:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ================= HERO ================= */

#heroSection{
  padding:90px 20px 50px;
  text-align:center;
  background:linear-gradient(180deg,#0b1120,#0f172a);
}

#heroTitle{
  font-size:3rem;
  background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:20px;
}

#heroSubtitle{
  max-width:650px;
  margin:auto;
  opacity:.85;
}

/* ================= GRID ================= */

#streamingSection{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:25px;
  padding:50px 8%;
}

@media(max-width:1000px){
  #streamingSection{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  #streamingSection{grid-template-columns:1fr;}
}

/* ================= CARD ================= */

.streamingCard{
  background:var(--card);
  padding:20px;
  border-radius:18px;
  text-align:center;
  position:relative;
  cursor:pointer;
  transition:.3s;
}

.streamingCard:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px var(--neon-blue);
}

.streamingCard img{
  width:100%;
  height:130px;
  object-fit:contain;
  background:#111827;
  padding:10px;
  border-radius:12px;
  margin-bottom:15px;
}

/* ================= BADGES ================= */

.badge{
  position:absolute;
  top:10px;
  padding:6px 12px;
  font-size:.7rem;
  font-weight:600;
  border-radius:20px;
}

.masVendido{
  left:10px;
  background:var(--gold);
  color:#000;
  box-shadow:0 0 12px var(--gold);
}

.pocaDisponibilidad{
  right:10px;
  background:var(--warning);
  color:#fff;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(239,68,68,.7);}
  70%{box-shadow:0 0 0 12px rgba(239,68,68,0);}
  100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}
}

/* ================= MODAL ================= */

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(18px);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modalContainer{
  padding:3px;
  border-radius:25px;
  background:linear-gradient(135deg,var(--neon-blue),var(--neon-green));
  box-shadow:0 0 35px var(--neon-blue);
  animation:scaleIn .4s ease;
}

@keyframes scaleIn{
  from{transform:scale(.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

.modalContent{
  background:#0f172a;
  padding:30px;
  border-radius:22px;
  width:320px;
  text-align:center;
}

.modalContent img{
  width:100%;
  height:140px;
  object-fit:contain;
  margin-bottom:15px;
}

.price{
  font-size:1.3rem;
  font-weight:600;
  margin:10px 0;
  color:var(--neon-green);
}

.duration{
  font-size:.9rem;
  margin-bottom:15px;
}

/* BOTONES */

.modalButtons{
  display:flex;
  gap:10px;
}

.modalButtons a,
.modalButtons button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
}

.whatsappBtn{
  background:#25D366;
  color:white;
}

.closeBtn{
  background:#ff6584;
  color:white;
}

</style>
</head>
<body>

<section id="heroSection">
  <h1 id="heroTitle">Plataformas Streaming Premium</h1>
  <p id="heroSubtitle">
    Disfruta tus series y películas favoritas al mejor precio.
    Acceso rápido, seguro y confiable.
  </p>
</section>

<section id="streamingSection">

<!-- EJEMPLO CARDS -->

<div class="streamingCard" onclick="openModal(this)"
data-name="Netflix" data-price="$120 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<div class="badge masVendido">Más Vendido</div>
<div class="badge pocaDisponibilidad">Poca Disponibilidad</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<h3>Netflix</h3>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Disney+" data-price="$110 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<div class="badge masVendido">Más Vendido</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<h3>Disney+</h3>
</div>

<!-- DUPLICA MÁS CARDS AQUÍ -->

</section>

<div class="modal" id="mainModal">
  <div class="modalContainer">
    <div class="modalContent">
      <img id="modalImage">
      <h2 id="modalTitle"></h2>
      <div class="price" id="modalPrice"></div>
      <div class="duration" id="modalDuration"></div>
      <div class="modalButtons">
        <a id="whatsappLink" target="_blank" class="whatsappBtn">Contratar</a>
        <button class="closeBtn" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script>
function openModal(card){
  document.getElementById("modalTitle").innerText=card.dataset.name;
  document.getElementById("modalPrice").innerText=card.dataset.price;
  document.getElementById("modalDuration").innerText="Duración: "+card.dataset.duration;
  document.getElementById("modalImage").src=card.dataset.img;
  const msg=`Hola, quiero contratar ${card.dataset.name}`;
  document.getElementById("whatsappLink").href=
  `https://wa.me/5210000000000?text=${encodeURIComponent(msg)}`;
  document.getElementById("mainModal").style.display="flex";
}

function closeModal(){
  document.getElementById("mainModal").style.display="none";
}

window.onclick=e=>{
  if(e.target===document.getElementById("mainModal")){
    closeModal();
  }
}
</script>

</body>
</html>
