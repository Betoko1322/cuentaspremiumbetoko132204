<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataformas Streaming Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--neon-blue:#00f7ff;
--neon-green:#00ffb3;
}

/* ===== FONDO ===== */
body{
margin:0;
font-family:'Poppins',sans-serif;
color:#fff;
background:url("fondo.jpg") no-repeat center center fixed;
background-size:cover;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:-1;
}

/* ===== HEADER CRISTAL ===== */
.headerSection{
text-align:center;
margin:50px auto;
padding:35px;
max-width:1000px;
border-radius:25px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.3);
}

.headerSection h1{
font-size:2.3rem;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
-webkit-background-clip:text;
color:transparent;
}

.headerSection p{
opacity:.9;
margin-top:10px;
}

/* ===== GRID 4 POR FILA ===== */
#streamingSection{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
max-width:1200px;
margin:auto;
padding:20px;
}

/* Responsive */
@media(max-width:900px){
#streamingSection{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
#streamingSection{
grid-template-columns:1fr;
}
}

/* ===== CARDS CRISTAL ===== */
.streamingCard{
padding:20px;
border-radius:22px;
text-align:center;
cursor:pointer;
transition:.4s ease;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.25);

display:flex;
flex-direction:column;
justify-content:space-between;

min-height:320px; /* 🔥 misma altura exacta */
}

.streamingCard:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 40px rgba(0,255,200,.5);
}

.streamingCard img{
width:100%;
height:180px; /* 🔥 todas mismo tamaño */
border-radius:15px;
object-fit:cover;
}

/* Título alineado */
.streamingCard h3{
margin-top:15px;
font-size:1.1rem;
min-height:30px;
display:flex;
align-items:center;
justify-content:center;
}

/* Botón */
.infoBtn{
margin-top:auto;
padding:10px 16px;
border:none;
border-radius:25px;
cursor:pointer;
font-weight:600;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
color:#000;
transition:.3s;
}

.infoBtn:hover{
transform:scale(1.08);
}

/* ===== MODAL ===== */
#mainModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);
justify-content:center;
align-items:center;
opacity:0;
transition:.3s;
}

#mainModal.active{
display:flex;
opacity:1;
}

.modalContent{
width:380px;
max-width:90%;
padding:30px;
border-radius:25px;
text-align:center;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.3);

transform:scale(.8);
opacity:0;
transition:.3s;
}

#mainModal.active .modalContent{
transform:scale(1);
opacity:1;
}

.modalContent img{
width:100%;
height:200px;
border-radius:15px;
object-fit:cover;
margin-bottom:15px;
}

.whatsappBtn{
display:inline-block;
margin-top:15px;
padding:12px 22px;
border-radius:30px;
background:#25D366;
color:#fff;
text-decoration:none;
font-weight:600;
}

.closeBtn{
margin-top:15px;
padding:8px 15px;
border:none;
border-radius:20px;
cursor:pointer;
background:#ff4d4d;
color:#fff;
}
</style>
</head>

<body>

<div class="headerSection">
<h1>Plataformas Streaming Premium</h1>
<p>Elige tu plataforma favorita y contrata al mejor precio.</p>
</div>

<section id="streamingSection">

<!-- FILA 1 -->
<div class="streamingCard" onclick="openModal(this)"
data-name="Netflix" data-price="$120 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?1">
<img src="https://picsum.photos/400/300?1">
<h3>Netflix</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="HBO Max" data-price="$110 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?2">
<img src="https://picsum.photos/400/300?2">
<h3>HBO Max</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="ViX+" data-price="$95 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?3">
<img src="https://picsum.photos/400/300?3">
<h3>ViX+</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Paramount+" data-price="$100 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?4">
<img src="https://picsum.photos/400/300?4">
<h3>Paramount+</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<!-- FILA 2 -->
<div class="streamingCard" onclick="openModal(this)"
data-name="Disney+" data-price="$115 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?5">
<img src="https://picsum.photos/400/300?5">
<h3>Disney+</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Spotify" data-price="$90 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?6">
<img src="https://picsum.photos/400/300?6">
<h3>Spotify</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Crunchyroll" data-price="$95 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?7">
<img src="https://picsum.photos/400/300?7">
<h3>Crunchyroll</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="YouTube Premium" data-price="$110 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?8">
<img src="https://picsum.photos/400/300?8">
<h3>YouTube Premium</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

</section>

<!-- MODAL -->
<div id="mainModal">
<div class="modalContent">
<img id="modalImage">
<h2 id="modalTitle"></h2>
<p id="modalPrice"></p>
<p id="modalDuration"></p>
<a id="whatsappLink" target="_blank" class="whatsappBtn">Contratar por WhatsApp</a>
<br>
<button class="closeBtn" onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>
function openModal(card){
event.stopPropagation();

document.getElementById("modalTitle").innerText=card.dataset.name;
document.getElementById("modalPrice").innerText=card.dataset.price;
document.getElementById("modalDuration").innerText="Duración: "+card.dataset.duration;
document.getElementById("modalImage").src=card.dataset.img;

const msg=`Hola, quiero contratar ${card.dataset.name}`;
document.getElementById("whatsappLink").href=
`https://wa.me/5536509109?text=${encodeURIComponent(msg)}`;

document.getElementById("mainModal").classList.add("active");
}

function closeModal(){
document.getElementById("mainModal").classList.remove("active");
}
</script>

</body>
</html>
