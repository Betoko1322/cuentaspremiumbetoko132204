<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataformas Streaming Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--neon-blue:#00f7ff;
--neon-green:#00ffb3;
--dark-bg:#0f172a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#0b1120);
color:#fff;
padding:50px 20px;
}

/* TITULO */
.headerSection{
text-align:center;
margin-bottom:40px;
}

.headerSection h1{
font-size:2.2rem;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
-webkit-background-clip:text;
color:transparent;
}

.headerSection p{
opacity:.8;
margin-top:10px;
}

/* GRID */
#streamingSection{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

/* 🔥 EFECTO CRISTAL PREMIUM CARDS */

.streamingCard{
position:relative;
padding:18px;
border-radius:22px;
cursor:pointer;
text-align:center;
overflow:hidden;
transition:.4s ease;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

background:
linear-gradient(rgba(15,23,42,.6), rgba(15,23,42,.6)) padding-box,
linear-gradient(135deg,var(--neon-blue),var(--neon-green)) border-box;

border:2px solid transparent;

box-shadow:0 0 20px rgba(0,255,200,.15);
}

.streamingCard:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 35px rgba(0,255,200,.4);
}

.streamingCard img{
width:100%;
height:160px;
border-radius:14px;
object-fit:cover;
}

.streamingCard h3{
margin-top:12px;
font-size:1.1rem;
}

.infoBtn{
margin-top:12px;
padding:8px 16px;
border:none;
border-radius:20px;
font-size:.85rem;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
color:#000;
transition:.3s;
}

.infoBtn:hover{
transform:scale(1.07);
}

/* MODAL CRISTAL */

#mainModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
backdrop-filter:blur(12px);
justify-content:center;
align-items:center;
z-index:999;
opacity:0;
transition:opacity .3s ease;
}

#mainModal.active{
display:flex;
opacity:1;
}

.modalContent{
width:360px;
max-width:90%;
padding:30px;
border-radius:25px;
text-align:center;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);

background:
linear-gradient(rgba(15,23,42,.7), rgba(15,23,42,.7)) padding-box,
linear-gradient(135deg,var(--neon-blue),var(--neon-green)) border-box;

border:2px solid transparent;

box-shadow:0 0 40px rgba(0,255,200,.4);

transform:scale(.8);
opacity:0;
transition:all .3s ease;
}

#mainModal.active .modalContent{
transform:scale(1);
opacity:1;
}

.modalContent img{
width:100%;
height:200px;
border-radius:15px;
object-fit:cover;
margin-bottom:15px;
}

.whatsappBtn{
display:inline-block;
margin-top:12px;
padding:10px 20px;
border-radius:25px;
background:#25D366;
color:#fff;
text-decoration:none;
font-weight:600;
}

.closeBtn{
margin-top:15px;
padding:8px 15px;
border:none;
border-radius:20px;
cursor:pointer;
background:#ff4d4d;
color:#fff;
}
</style>
</head>

<body>

<div class="headerSection">
<h1>Plataformas Streaming Premium</h1>
<p>Elige tu plataforma favorita y contrata al mejor precio.</p>
</div>

<section id="streamingSection">

<!-- CARDS EJEMPLO (puedes duplicar y cambiar datos) -->

<div class="streamingCard" onclick="openModal(this)"
data-name="Netflix" data-price="$120 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?1">
<img src="https://picsum.photos/400/300?1">
<h3>Netflix</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Disney+" data-price="$110 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?2">
<img src="https://picsum.photos/400/300?2">
<h3>Disney+</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="HBO Max" data-price="$100 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?3">
<img src="https://picsum.photos/400/300?3">
<h3>HBO Max</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Prime Video" data-price="$95 MXN" data-duration="1 Mes"
data-img="https://picsum.photos/400/300?4">
<img src="https://picsum.photos/400/300?4">
<h3>Prime Video</h3>
<button class="infoBtn" onclick="openModal(this.parentElement)">Más información</button>
</div>

</section>

<!-- MODAL -->
<div id="mainModal">
<div class="modalContent">
<img id="modalImage">
<h2 id="modalTitle"></h2>
<p id="modalPrice"></p>
<p id="modalDuration"></p>
<a id="whatsappLink" target="_blank" class="whatsappBtn">Contratar por WhatsApp</a>
<br>
<button class="closeBtn" onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>
function openModal(card){
event.stopPropagation();

document.getElementById("modalTitle").innerText=card.dataset.name;
document.getElementById("modalPrice").innerText=card.dataset.price;
document.getElementById("modalDuration").innerText="Duración: "+card.dataset.duration;
document.getElementById("modalImage").src=card.dataset.img;

const msg=`Hola, quiero contratar ${card.dataset.name}`;
document.getElementById("whatsappLink").href=
`https://wa.me/5536509109?text=${encodeURIComponent(msg)}`;

document.getElementById("mainModal").classList.add("active");
}

function closeModal(){
document.getElementById("mainModal").classList.remove("active");
}
</script>

</body>
</html>
