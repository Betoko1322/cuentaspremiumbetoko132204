<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataformas Streaming | DigitalPro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0b1120;
  --card:#1e293b;
  --text:#f1f5f9;
  --neon-blue:#00f3ff;
  --neon-green:#00ff9d;
  --gold:#facc15;
  --warning:#ef4444;
  --accent:#ff6584;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* BOTÓN REGRESAR */

#backButton{
  position:fixed;
  top:20px;
  left:20px;
  background:var(--accent);
  color:white;
  padding:8px 18px;
  border-radius:25px;
  text-decoration:none;
  font-size:.85rem;
  font-weight:600;
  z-index:1000;
}

/* HERO */

#heroSection{
  padding:100px 20px 60px;
  text-align:center;
  background:linear-gradient(180deg,#0b1120,#0f172a);
}

#heroTitle{
  font-size:3rem;
  background:linear-gradient(90deg,var(--neon-blue),var(--neon-green));
  -webkit-background-clip:text;
  color:transparent;
}

/* GRID */

#streamingSection{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:25px;
  padding:50px 8%;
}

@media(max-width:1000px){
  #streamingSection{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
  #streamingSection{grid-template-columns:1fr;}
  #heroTitle{font-size:1.9rem;}
}

/* CARD */

.streamingCard{
  background:var(--card);
  padding:20px;
  border-radius:18px;
  text-align:center;
  position:relative;
  cursor:pointer;
  transition:.3s;
}

.streamingCard:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px var(--neon-blue);
}

.streamingCard img{
  width:100%;
  height:120px;
  object-fit:contain;
  background:#111827;
  padding:10px;
  border-radius:12px;
  margin-bottom:15px;
}

/* BADGES */

.badge{
  position:absolute;
  top:10px;
  padding:6px 12px;
  font-size:.7rem;
  font-weight:600;
  border-radius:20px;
}

.masVendido{
  left:10px;
  background:var(--gold);
  color:#000;
}

.pocaDisponibilidad{
  right:10px;
  background:var(--warning);
  color:#fff;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(239,68,68,.7);}
  70%{box-shadow:0 0 0 12px rgba(239,68,68,0);}
  100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}
}

/* MODAL CORREGIDO */

#mainModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(12px);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modalContent{
  width:340px;
  max-width:90%;
  padding:30px;
  border-radius:22px;
  text-align:center;
  background:
    linear-gradient(#0f172a,#0f172a) padding-box,
    linear-gradient(135deg,var(--neon-blue),var(--neon-green)) border-box;
  border:3px solid transparent;
  box-shadow:0 0 35px rgba(0,255,200,.4);
}

.modalContent img{
  width:100%;
  height:130px;
  object-fit:contain;
  margin-bottom:15px;
}

.price{
  font-size:1.3rem;
  font-weight:600;
  margin:10px 0;
  color:var(--neon-green);
}

.modalButtons{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.modalButtons a,
.modalButtons button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
}

.whatsappBtn{
  background:#25D366;
  color:white;
}

.closeBtn{
  background:var(--accent);
  color:white;
}

@media(max-width:600px){
  .modalButtons{flex-direction:column;}
}

</style>
</head>
<body>

<a href="index.html" id="backButton">⬅ Regresar</a>

<section id="heroSection">
<h1 id="heroTitle">Plataformas Streaming Premium</h1>
</section>

<section id="streamingSection">

<!-- FILA 1 -->

<div class="streamingCard" onclick="openModal(this)"
data-name="Netflix" data-price="$120 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<div class="badge masVendido">Más Vendido</div>
<div class="badge pocaDisponibilidad">Poca Disponibilidad</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
<h3>Netflix</h3>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Disney+" data-price="$110 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<div class="badge masVendido">Más Vendido</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg">
<h3>Disney+</h3>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="HBO Max" data-price="$115 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/1/17/HBO_Max_Logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/17/HBO_Max_Logo.svg">
<h3>HBO Max</h3>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Prime Video" data-price="$100 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png">
<h3>Prime Video</h3>
</div>

<!-- FILA 2 -->

<div class="streamingCard" onclick="openModal(this)"
data-name="Paramount+" data-price="$90 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/8/8a/Paramount%2B_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Paramount%2B_logo.svg">
<h3>Paramount+</h3>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Star+" data-price="$95 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/8/89/Star%2B_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Star%2B_logo.svg">
<h3>Star+</h3>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Crunchyroll" data-price="$85 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/0/08/Crunchyroll_Logo.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Crunchyroll_Logo.png">
<h3>Crunchyroll</h3>
</div>

<div class="streamingCard" onclick="openModal(this)"
data-name="Vix+" data-price="$80 MXN" data-duration="1 Mes"
data-img="https://upload.wikimedia.org/wikipedia/commons/5/5f/Vix_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Vix_logo.svg">
<h3>Vix+</h3>
</div>

</section>

<!-- MODAL -->

<div id="mainModal">
  <div class="modalContent">
    <img id="modalImage">
    <h2 id="modalTitle"></h2>
    <div class="price" id="modalPrice"></div>
    <div id="modalDuration"></div>
    <div class="modalButtons">
      <a id="whatsappLink" target="_blank" class="whatsappBtn">Contratar</a>
      <button class="closeBtn" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
function openModal(card){
document.getElementById("modalTitle").innerText=card.dataset.name;
document.getElementById("modalPrice").innerText=card.dataset.price;
document.getElementById("modalDuration").innerText="Duración: "+card.dataset.duration;
document.getElementById("modalImage").src=card.dataset.img;

const msg=`Hola, quiero contratar ${card.dataset.name}`;
document.getElementById("whatsappLink").href=
`https://wa.me/5536509109?text=${encodeURIComponent(msg)}`;

document.getElementById("mainModal").style.display="flex";
}

function closeModal(){
document.getElementById("mainModal").style.display="none";
}

window.onclick=function(e){
if(e.target==document.getElementById("mainModal")){
closeModal();
}
}
</script>

</body>
</html>
