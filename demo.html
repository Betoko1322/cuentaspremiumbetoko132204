<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tarjeta Digital Profesional</title>

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- FUENTE -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   BODY
========================= */

body{
    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top,#1f2937,#050505 70%);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
    overflow-x:hidden;
}

/* =========================
   CARD
========================= */

#card{
    width:390px;

    background:#0f172a;

    border:1px solid rgba(255,255,255,0.08);

    border-radius:38px;

    overflow:hidden;

    position:relative;

    box-shadow:
    0 25px 50px rgba(0,0,0,0.65),
    0 0 25px rgba(99,102,241,0.12);

    animation:cardEntry 1s ease;

    transition:0.4s;
}

#card:hover{
    transform:translateY(-8px);

    box-shadow:
    0 35px 60px rgba(0,0,0,0.8),
    0 0 35px rgba(99,102,241,0.2);
}

/* =========================
   HEADER
========================= */

#header{
    height:270px;

    background:
    linear-gradient(
        135deg,
        #111827,
        #020617
    );

    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* EFECTOS HEADER */

#header::before{
    content:"";

    position:absolute;

    width:520px;
    height:520px;

    background:
    radial-gradient(
        circle,
        rgba(99,102,241,0.14),
        transparent 70%
    );

    border-radius:50%;

    top:-340px;
    right:-150px;

    animation:rotateBg 18s linear infinite;
}

#header::after{
    content:"";

    position:absolute;

    width:260px;
    height:260px;

    background:
    radial-gradient(
        circle,
        rgba(168,85,247,0.10),
        transparent 70%
    );

    border-radius:50%;

    bottom:-120px;
    left:-90px;
}

/* =========================
   FOTO
========================= */

#photo-container{
    width:180px;
    height:180px;

    border-radius:50%;

    overflow:hidden;

    border:5px solid rgba(255,255,255,0.12);

    position:relative;
    z-index:5;

    box-shadow:
    0 15px 35px rgba(0,0,0,0.6),
    0 0 25px rgba(99,102,241,0.25);

    animation:floatPhoto 5s ease-in-out infinite;
}

#photo-container img{
    width:100%;
    height:100%;

    object-fit:cover;
}

/* BRILLO FOTO */

#photo-container::before{
    content:"";

    position:absolute;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,0.18),
        transparent 80%
    );

    top:0;
    left:-100%;

    animation:shine 4s infinite;
}

/* =========================
   CONTENT
========================= */

#content{
    padding:35px 28px 30px;
    position:relative;
    margin-top:-10px;
}

/* =========================
   LOGO
========================= */

#logo{
    width:85px;
    height:85px;

    background:
    linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );

    color:white;

    border-radius:24px;

    display:flex;
    justify-content:center;
    align-items:center;

    position:absolute;

    top:-42px;
    right:28px;

    font-size:34px;

    box-shadow:
    0 12px 25px rgba(99,102,241,0.35);

    animation:pulse 3s infinite;
}

/* =========================
   INFO
========================= */

#info{
    margin-top:15px;
}

#name{
    font-size:30px;
    color:#ffffff;
    margin-bottom:6px;
    font-weight:700;
}

#profession{
    color:#8b5cf6;
    font-size:17px;
    margin-bottom:5px;
    font-weight:600;
}

#company{
    color:#94a3b8;
    font-size:14px;
}

/* =========================
   SOCIAL
========================= */

#social-links{
    display:flex;
    justify-content:space-between;

    margin-top:30px;
    margin-bottom:30px;

    gap:12px;
}

.social-btn{
    flex:1;

    height:62px;

    border-radius:20px;

    background:#111827;

    color:#e2e8f0;

    border:1px solid rgba(255,255,255,0.06);

    display:flex;
    justify-content:center;
    align-items:center;

    text-decoration:none;

    font-size:26px;

    transition:0.35s;

    position:relative;

    overflow:hidden;

    box-shadow:
    0 10px 20px rgba(0,0,0,0.35);
}

/* EFECTO */

.social-btn::before{
    content:"";

    position:absolute;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );

    top:100%;
    left:0;

    transition:0.35s;

    z-index:0;
}

.social-btn i{
    position:relative;
    z-index:2;
}

.social-btn:hover::before{
    top:0;
}

.social-btn:hover{
    color:white;

    transform:
    translateY(-6px)
    scale(1.05);

    box-shadow:
    0 15px 25px rgba(99,102,241,0.35);
}

/* =========================
   CONTACT BOX
========================= */

#contact-box{
    background:#111827;

    border-radius:28px;

    padding:22px;

    border:1px solid rgba(255,255,255,0.06);

    box-shadow:
    inset 0 0 12px rgba(255,255,255,0.02);
}

/* =========================
   CONTACT ITEM
========================= */

.contact-item{
    display:flex;
    align-items:flex-start;

    gap:15px;

    margin-bottom:22px;

    transition:0.3s;
}

.contact-item:last-child{
    margin-bottom:0;
}

.contact-item:hover{
    transform:translateX(6px);
}

/* ICONO */

.contact-icon{
    width:50px;
    height:50px;

    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:18px;

    flex-shrink:0;

    box-shadow:
    0 10px 20px rgba(99,102,241,0.28);
}

/* TEXTOS */

.contact-title{
    color:#ffffff;
    font-size:15px;
    font-weight:600;
    margin-bottom:3px;
}

.contact-text{
    color:#94a3b8;
    font-size:14px;
    line-height:1.5;
    word-break:break-word;
}

/* =========================
   BUTTONS
========================= */

#buttons{
    display:flex;
    justify-content:center;

    margin-top:28px;
}

.btn{
    border:none;

    padding:15px 25px;

    border-radius:18px;

    font-size:15px;
    font-weight:600;

    cursor:pointer;

    transition:0.35s;
}

/* SAVE */

#save-btn{
    width:100%;

    background:
    linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );

    color:white;

    box-shadow:
    0 12px 25px rgba(99,102,241,0.3);
}

#save-btn:hover{
    transform:translateY(-4px);

    box-shadow:
    0 18px 30px rgba(99,102,241,0.45);
}

/* =========================
   ANIMACIONES
========================= */

@keyframes cardEntry{
    from{
        opacity:0;
        transform:translateY(40px) scale(0.95);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes floatPhoto{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
    100%{
        transform:translateY(0px);
    }
}

@keyframes shine{
    0%{
        left:-100%;
    }
    100%{
        left:120%;
    }
}

@keyframes rotateBg{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

    body{
        padding:20px;
    }

    #card{
        width:100%;
        max-width:390px;
    }

}

@media(max-width:480px){

    body{
        padding:12px;
    }

    #card{
        border-radius:28px;
    }

    #header{
        height:240px;
    }

    #photo-container{
        width:150px;
        height:150px;
    }

    #content{
        padding:28px 20px 24px;
    }

    #logo{
        width:72px;
        height:72px;
        font-size:28px;
        top:-36px;
        right:20px;
    }

    #name{
        font-size:24px;
    }

    #profession{
        font-size:15px;
    }

    #social-links{
        gap:10px;
    }

    .social-btn{
        height:54px;
        font-size:22px;
        border-radius:16px;
    }

    #contact-box{
        padding:18px;
    }

    .contact-icon{
        width:44px;
        height:44px;
        border-radius:14px;
        font-size:16px;
    }

    .contact-title{
        font-size:14px;
    }

    .contact-text{
        font-size:13px;
    }

    #save-btn{
        padding:14px;
        font-size:14px;
    }

}

@media(max-width:360px){

    #name{
        font-size:22px;
    }

    .social-btn{
        height:48px;
        font-size:20px;
    }

    .contact-item{
        gap:12px;
    }

}

/* =========================
   SCROLL SUAVE
========================= */

html{
    scroll-behavior:smooth;
}

</style>
</head>

<body>

<!-- CARD -->
<div id="card">

    <!-- HEADER -->
    <div id="header">

        <!-- FOTO -->
        <div id="photo-container">

            <img
            id="profile-image"
            src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800"
            alt="Foto">

        </div>

    </div>

    <!-- CONTENT -->
    <div id="content">

        <!-- LOGO -->
        <div id="logo">
            <i class="fa-solid fa-user-doctor"></i>
        </div>

        <!-- INFO -->
        <div id="info">

            <h1 id="name">
                Susan S. Riehle
            </h1>

            <h3 id="profession">
                Médico Especialista
            </h3>

            <p id="company">
                Hospital Metropolitano
            </p>

        </div>

        <!-- REDES -->
        <div id="social-links">

            <a
            id="facebook-link"
            class="social-btn"
            href="#">

                <i class="fa-brands fa-facebook-f"></i>

            </a>

            <a
            id="whatsapp-link"
            class="social-btn"
            href="#">

                <i class="fa-brands fa-whatsapp"></i>

            </a>

            <a
            id="gmail-link"
            class="social-btn"
            href="#">

                <i class="fa-solid fa-envelope"></i>

            </a>

            <a
            id="instagram-link"
            class="social-btn"
            href="#">

                <i class="fa-brands fa-instagram"></i>

            </a>

        </div>

        <!-- CONTACTO -->
        <div id="contact-box">

            <!-- TELEFONO -->
            <div id="phone-item" class="contact-item">

                <div class="contact-icon">
                    <i class="fa-solid fa-phone"></i>
                </div>

                <div>

                    <div class="contact-title">
                        Teléfono
                    </div>

                    <div class="contact-text">
                        +52 55 1234 5678
                    </div>

                </div>

            </div>

            <!-- CORREO -->
            <div id="email-item" class="contact-item">

                <div class="contact-icon">
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div>

                    <div class="contact-title">
                        Correo electrónico
                    </div>

                    <div class="contact-text">
                        contacto@hospital.com
                    </div>

                </div>

            </div>

            <!-- UBICACION -->
            <div id="location-item" class="contact-item">

                <div class="contact-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>

                <div>

                    <div class="contact-title">
                        Ubicación
                    </div>

                    <div class="contact-text">
                        Ciudad de México, México
                    </div>

                </div>

            </div>

            <!-- WEB -->
            <div id="website-item" class="contact-item">

                <div class="contact-icon">
                    <i class="fa-solid fa-globe"></i>
                </div>

                <div>

                    <div class="contact-title">
                        Sitio web
                    </div>

                    <div class="contact-text">
                        www.tusitio.com
                    </div>

                </div>

            </div>

            <!-- LINKEDIN -->
            <div id="linkedin-item" class="contact-item">

                <div class="contact-icon">
                    <i class="fa-brands fa-linkedin-in"></i>
                </div>

                <div>

                    <div class="contact-title">
                        LinkedIn
                    </div>

                    <div class="contact-text">
                        linkedin.com/in/doctor
                    </div>

                </div>

            </div>

        </div>

        <!-- BOTON -->
        <div id="buttons">

            <button id="save-btn" class="btn">

                <i class="fa-solid fa-address-card"></i>

                Guardar Contacto

            </button>

        </div>

    </div>

</div>

</body>
</html>
