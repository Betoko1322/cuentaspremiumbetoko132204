<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenido</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

/* FONDO */

body{
min-height:100vh;
background:url("https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80") center/cover no-repeat fixed;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* CAJA PRINCIPAL EFECTO CRISTAL */

#contenedor{

width:90%;
max-width:900px;
padding:50px 40px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

border-radius:20px;
border:1px solid rgba(255,255,255,0.2);

box-shadow:0 8px 40px rgba(0,0,0,0.4);

text-align:center;

}

/* TITULO */

h1{
font-size:2.5rem;
margin-bottom:15px;
}

/* TEXTO */

p{
opacity:.9;
margin-bottom:40px;
}

/* LISTA SERVICIOS */

.servicios{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:40px;
}

.servicio{

padding:18px;

background:rgba(255,255,255,0.1);
border-radius:12px;

backdrop-filter:blur(5px);
border:1px solid rgba(255,255,255,0.15);

transition:.3s;

}

.servicio:hover{

background:rgba(255,255,255,0.18);
transform:scale(1.03);

}

/* BOTON */

button{

padding:15px 40px;
border:none;
border-radius:30px;

background:white;
color:black;

font-weight:bold;
cursor:pointer;

transition:.3s;

}

button:hover{
transform:scale(1.08);
}

/* RESPONSIVE */

@media(max-width:600px){

#contenedor{
padding:35px 25px;
}

h1{
font-size:1.8rem;
}

.servicios{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div id="contenedor">

<h1>Bienvenido</h1>

<p>Selecciona uno de nuestros servicios</p>

<div class="servicios">

<div class="servicio">
Plataformas Streaming
</div>

<div class="servicio">
Páginas Web
</div>

<div class="servicio">
Tarjetas Digitales
</div>

<div class="servicio">
Invitaciones Digitales
</div>

<div class="servicio">
Activación Office
</div>

</div>

<button onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

window.location.href="https://betoko1322.github.io/cuentaspremiumbetoko132204/principal.html";

}

</script>

</body>
</html>
