<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuentas Premium Betoko</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:url("https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80")
center/cover no-repeat fixed;

display:flex;
align-items:center;
justify-content:center;

color:white;

}

/* INTRO */

#intro{

position:fixed;
inset:0;

background:black;

display:flex;
align-items:center;
justify-content:center;

z-index:10;

animation:fadeOut 1s ease 3s forwards;

}

#intro h1{

font-size:2.6rem;
text-align:center;
letter-spacing:3px;

animation:zoom 2s ease;

}

/* CONTENIDO */

.container{

text-align:center;

opacity:0;

animation:showContent 1s ease 3.2s forwards;

}

/* SISTEMA */

.system{

position:relative;

width:420px;
height:420px;

margin:auto;

animation:spin 30s linear infinite;

}

/* TEXTO CENTRAL */

.center{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:1.8rem;
font-weight:600;

}

/* ORBITA */

.orbit{

position:absolute;

top:50%;
left:50%;

width:360px;
height:360px;

transform:translate(-50%,-50%);

border-radius:50%;

border:1px solid rgba(255,255,255,.2);

}

/* NODOS */

.node{

position:absolute;

top:50%;
left:50%;

padding:10px 14px;

background:rgba(255,255,255,0.15);

border-radius:30px;

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,.4);

box-shadow:

0 0 12px rgba(255,255,255,.4),
inset 0 0 8px rgba(255,255,255,.4);

white-space:nowrap;

/* texto siempre derecho */
animation:counterSpin 30s linear infinite;

}

/* POSICION CIRCULAR */

.node1{ transform:rotate(0deg) translate(180px) rotate(0deg); }
.node2{ transform:rotate(72deg) translate(180px) rotate(-72deg); }
.node3{ transform:rotate(144deg) translate(180px) rotate(-144deg); }
.node4{ transform:rotate(216deg) translate(180px) rotate(-216deg); }
.node5{ transform:rotate(288deg) translate(180px) rotate(-288deg); }

/* LINEAS */

svg{

position:absolute;

width:100%;
height:100%;

pointer-events:none;

}

line{

stroke:white;
opacity:.3;

transition:.3s;

}

.system:hover line{

opacity:1;
stroke-width:2;

}

/* BOTON */

button{

margin-top:40px;

padding:14px 45px;

border:none;

border-radius:25px;

background:white;

color:black;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.1);

}

/* ANIMACIONES */

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

@keyframes counterSpin{

from{transform:rotate(0deg);}
to{transform:rotate(-360deg);}

}

@keyframes fadeOut{

to{
opacity:0;
visibility:hidden;
}

}

@keyframes zoom{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

@keyframes showContent{

to{
opacity:1;
}

}

/* RESPONSIVE */

@media(max-width:600px){

.system{

width:300px;
height:300px;

}

.orbit{

width:260px;
height:260px;

}

.node{

font-size:.8rem;

}

.center{

font-size:1.3rem;

}

}

</style>
</head>

<body>

<div id="intro">

<h1>Cuentas Premium<br>Betoko_132204</h1>

</div>

<div class="container">

<div class="system">

<div class="orbit"></div>

<div class="center">Bienvenido</div>

<svg>

<line x1="50%" y1="50%" x2="50%" y2="0%"/>
<line x1="50%" y1="50%" x2="85%" y2="30%"/>
<line x1="50%" y1="50%" x2="85%" y2="70%"/>
<line x1="50%" y1="50%" x2="50%" y2="100%"/>
<line x1="50%" y1="50%" x2="15%" y2="70%"/>

</svg>

<div class="node node1">Streaming</div>
<div class="node node2">Páginas Web</div>
<div class="node node3">Tarjetas</div>
<div class="node node4">Invitaciones</div>
<div class="node node5">Office</div>

</div>

<button onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

window.location.href="https://betoko1322.github.io/cuentaspremiumbetoko132204/principal.html";

}

</script>

</body>
</html>
