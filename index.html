<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios Digitales</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:url("https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80")
center/cover no-repeat fixed;

display:flex;
align-items:center;
justify-content:center;

color:white;

}

/* CAPA OSCURA SUAVE */

.overlay{

position:fixed;
inset:0;
background:rgba(0,0,0,0.45);

}

/* CONTENEDOR */

.container{

position:relative;
z-index:2;

width:90%;
max-width:1100px;

text-align:center;

}

/* TITULO */

h1{

font-size:2.8rem;
margin-bottom:10px;

}

.subtitle{

opacity:.85;
margin-bottom:50px;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;

}

/* TARJETAS */

.card{

background:rgba(255,255,255,0.08);

border-radius:18px;

padding:35px 20px;

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,0.15);

transition:.35s;

cursor:pointer;

}

.card:hover{

transform:translateY(-10px) scale(1.04);

background:rgba(255,255,255,0.18);

}

/* ICONO */

.icon{

font-size:40px;
margin-bottom:15px;

}

/* TITULO TARJETA */

.card h3{

margin-bottom:8px;

}

/* BOTON */

.btn{

margin-top:50px;

padding:14px 40px;

border:none;
border-radius:30px;

background:white;
color:black;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.btn:hover{

transform:scale(1.08);

}

/* RESPONSIVE */

@media(max-width:900px){

.grid{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:600px){

h1{
font-size:2rem;
}

.grid{

grid-template-columns:1fr;

}

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h1>Bienvenido</h1>
<p class="subtitle">Selecciona uno de nuestros servicios</p>

<div class="grid">

<div class="card">
<div class="icon">🎬</div>
<h3>Plataformas Streaming</h3>
</div>

<div class="card">
<div class="icon">🌐</div>
<h3>Páginas Web</h3>
</div>

<div class="card">
<div class="icon">💳</div>
<h3>Tarjetas Digitales</h3>
</div>

<div class="card">
<div class="icon">🎉</div>
<h3>Invitaciones Digitales</h3>
</div>

<div class="card">
<div class="icon">📊</div>
<h3>Activación Office</h3>
</div>

</div>

<button class="btn" onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

window.location.href="https://betoko1322.github.io/cuentaspremiumbetoko132204/principal.html";

}

</script>

</body>
</html>
