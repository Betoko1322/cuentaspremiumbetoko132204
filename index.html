<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* FONDO */

body{

background:#111;

color:white;

min-height:100vh;

}

/* PANTALLA DE BIENVENIDA */

#intro{

position:fixed;
inset:0;

background:#000;

display:flex;
align-items:center;
justify-content:center;

z-index:100;

animation:fadeOut 1s ease 3s forwards;

}

#intro h1{

font-size:3rem;
letter-spacing:3px;

animation:zoom 2s ease;

}

/* CONTENEDOR */

.container{

padding:60px 8%;

animation:fadeIn 1.5s ease;

}

/* TITULO */

h2{

margin-bottom:30px;
font-size:1.8rem;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;

}

/* TARJETAS */

.card{

background:#1b1b1b;

border-radius:12px;

padding:35px 20px;

text-align:center;

cursor:pointer;

transition:.35s;

border:3px solid transparent;

}

/* BORDES DE COLORES */

.streaming{border-color:#e50914;}
.web{border-color:#1e90ff;}
.tarjetas{border-color:#00c853;}
.invitaciones{border-color:#ff9800;}
.office{border-color:#9c27b0;}

.card:hover{

transform:scale(1.08);

box-shadow:0 10px 40px rgba(0,0,0,0.8);

}

/* ICONO */

.icon{

font-size:38px;
margin-bottom:12px;

}

/* TEXTO */

.card h3{

font-size:1.1rem;

}

/* BOTON */

.btn{

margin-top:60px;

padding:14px 45px;

background:#e50914;

border:none;
border-radius:25px;

color:white;

font-size:1rem;

cursor:pointer;

transition:.3s;

}

.btn:hover{

transform:scale(1.08);

}

/* ANIMACIONES */

@keyframes fadeOut{

to{

opacity:0;
visibility:hidden;

}

}

@keyframes zoom{

from{

transform:scale(.5);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* RESPONSIVE */

@media(max-width:600px){

.container{

padding:40px 6%;

}

}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">

<h1>BETOKO DIGITAL</h1>

</div>

<div class="container">

<h2>Selecciona tu servicio</h2>

<div class="grid">

<div class="card streaming">
<div class="icon">🎬</div>
<h3>Plataformas Streaming</h3>
</div>

<div class="card web">
<div class="icon">🌐</div>
<h3>Páginas Web</h3>
</div>

<div class="card tarjetas">
<div class="icon">💳</div>
<h3>Tarjetas Digitales</h3>
</div>

<div class="card invitaciones">
<div class="icon">🎉</div>
<h3>Invitaciones Digitales</h3>
</div>

<div class="card office">
<div class="icon">📊</div>
<h3>Activación Office</h3>
</div>

</div>

<button class="btn" onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

window.location.href="https://betoko1322.github.io/cuentaspremiumbetoko132204/principal.html";

}

</script>

</body>
</html>
