<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuentas Premium Betoko</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:url("https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80")
center/cover no-repeat fixed;

display:flex;
align-items:center;
justify-content:center;

color:white;

overflow:hidden;

}

/* INTRO */

#intro{

position:fixed;
inset:0;

background:black;

display:flex;
align-items:center;
justify-content:center;

z-index:10;

animation:fadeOut 1s ease 3s forwards;

}

#intro h1{

font-size:2.5rem;
text-align:center;
letter-spacing:3px;

animation:zoom 2s ease;

}

/* CONTENIDO */

.container{

text-align:center;

opacity:0;

animation:showContent 1s ease 3.2s forwards;

}

/* CIRCULO */

.circle{

position:relative;

width:420px;
height:420px;

margin:auto;

animation:rotate 25s linear infinite;

}

/* TEXTO CENTRAL */

.center-text{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:1.8rem;
font-weight:600;

text-shadow:0 0 10px rgba(255,255,255,.6);

}

/* LINEAS */

svg{

position:absolute;
width:100%;
height:100%;

}

/* BURBUJAS */

.node{

position:absolute;

width:110px;

padding:12px;

text-align:center;

background:rgba(255,255,255,0.15);

border-radius:50px;

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,0.4);

box-shadow:

0 0 15px rgba(255,255,255,0.4),
inset 0 0 8px rgba(255,255,255,0.5);

transition:.3s;

}

.node:hover{

transform:scale(1.1);

background:rgba(255,255,255,0.3);

}

/* POSICIONES */

.n1{top:0;left:50%;transform:translateX(-50%);}
.n2{top:25%;right:0;}
.n3{bottom:25%;right:0;}
.n4{bottom:0;left:50%;transform:translateX(-50%);}
.n5{top:25%;left:0;}

/* BOTON */

button{

margin-top:40px;

padding:14px 45px;

border:none;

border-radius:25px;

background:#ffffff;

color:black;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.1);

}

/* ANIMACIONES */

@keyframes rotate{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

@keyframes fadeOut{

to{
opacity:0;
visibility:hidden;
}

}

@keyframes zoom{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

@keyframes showContent{

to{
opacity:1;
}

}

/* RESPONSIVE */

@media(max-width:600px){

.circle{

width:300px;
height:300px;

}

.node{

width:90px;
font-size:.8rem;

}

.center-text{

font-size:1.4rem;

}

}

</style>
</head>

<body>

<div id="intro">

<h1>Cuentas Premium<br>Betoko_132204</h1>

</div>

<div class="container">

<div class="circle">

<div class="center-text">Bienvenido</div>

<svg>

<line x1="50%" y1="50%" x2="50%" y2="0%" stroke="white" opacity=".4"/>

<line x1="50%" y1="50%" x2="100%" y2="25%" stroke="white" opacity=".4"/>

<line x1="50%" y1="50%" x2="100%" y2="75%" stroke="white" opacity=".4"/>

<line x1="50%" y1="50%" x2="50%" y2="100%" stroke="white" opacity=".4"/>

<line x1="50%" y1="50%" x2="0%" y2="25%" stroke="white" opacity=".4"/>

</svg>

<div class="node n1">Streaming</div>

<div class="node n2">Páginas Web</div>

<div class="node n3">Tarjetas</div>

<div class="node n4">Invitaciones</div>

<div class="node n5">Office</div>

</div>

<button onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

window.location.href="https://betoko1322.github.io/cuentaspremiumbetoko132204/principal.html";

}

</script>

</body>
</html>
