<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuentas Premium Betoko</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:url("https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80")
center/cover no-repeat fixed;

display:flex;
align-items:center;
justify-content:center;

color:white;

overflow:hidden;

}

/* INTRO */

#intro{

position:fixed;
inset:0;
background:black;

display:flex;
align-items:center;
justify-content:center;

z-index:10;

animation:fadeOut 1s ease 3s forwards;

}

#intro h1{

font-size:2.5rem;
text-align:center;
letter-spacing:3px;

animation:zoom 2s ease;

}

/* CONTENIDO */

.container{

text-align:center;

opacity:0;

animation:showContent 1s ease 3.2s forwards;

}

/* SISTEMA */

.system{

position:relative;

width:420px;
height:420px;

margin:auto;

}

/* CENTRO */

.center{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:1.8rem;
font-weight:600;

text-shadow:0 0 12px rgba(255,255,255,.8);

cursor:pointer;

}

/* ORBITA */

.orbit{

position:absolute;

top:50%;
left:50%;

width:320px;
height:320px;

margin:-160px;

border-radius:50%;

border:1px solid rgba(255,255,255,.2);

animation:spin 30s linear infinite;

}

/* NODO */

.node{

position:absolute;

top:50%;
left:50%;

transform-origin:-150px;

padding:10px 14px;

background:rgba(255,255,255,0.15);

border-radius:40px;

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,.4);

box-shadow:

0 0 15px rgba(255,255,255,.4),
inset 0 0 8px rgba(255,255,255,.5);

animation:float 4s ease-in-out infinite;

white-space:nowrap;

}

/* POSICIONES */

.n1{ transform:rotate(0deg) translateX(150px) rotate(0deg); }
.n2{ transform:rotate(72deg) translateX(150px) rotate(-72deg); }
.n3{ transform:rotate(144deg) translateX(150px) rotate(-144deg); }
.n4{ transform:rotate(216deg) translateX(150px) rotate(-216deg); }
.n5{ transform:rotate(288deg) translateX(150px) rotate(-288deg); }

/* LINEAS */

svg{

position:absolute;

width:100%;
height:100%;

pointer-events:none;

}

line{

stroke:white;

opacity:.2;

transition:.4s;

}

.system:hover line{

opacity:.9;

stroke-width:2;

}

/* BOTON */

button{

margin-top:40px;

padding:14px 45px;

border:none;

border-radius:25px;

background:white;

color:black;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.1);

}

/* ANIMACIONES */

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}

}

@keyframes fadeOut{

to{
opacity:0;
visibility:hidden;
}

}

@keyframes zoom{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

@keyframes showContent{

to{
opacity:1;
}

}

/* RESPONSIVE */

@media(max-width:600px){

.system{

width:300px;
height:300px;

}

.orbit{

width:230px;
height:230px;

margin:-115px;

}

.node{

font-size:.8rem;

}

.center{

font-size:1.4rem;

}

}

</style>
</head>

<body>

<div id="intro">

<h1>Cuentas Premium<br>Betoko_132204</h1>

</div>

<div class="container">

<div class="system">

<div class="center">Bienvenido</div>

<div class="orbit"></div>

<svg>

<line x1="50%" y1="50%" x2="80%" y2="50%"/>
<line x1="50%" y1="50%" x2="65%" y2="20%"/>
<line x1="50%" y1="50%" x2="35%" y2="20%"/>
<line x1="50%" y1="50%" x2="20%" y2="50%"/>
<line x1="50%" y1="50%" x2="35%" y2="80%"/>

</svg>

<div class="node n1">Streaming</div>
<div class="node n2">Páginas Web</div>
<div class="node n3">Tarjetas</div>
<div class="node n4">Invitaciones</div>
<div class="node n5">Office</div>

</div>

<button onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

window.location.href="https://betoko1322.github.io/cuentaspremiumbetoko132204/principal.html";

}

</script>

</body>
</html>
