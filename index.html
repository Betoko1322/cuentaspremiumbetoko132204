<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuentas Premium Betoko</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#0f0f0f;
color:white;

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

}

/* INTRO */

#intro{

position:fixed;
inset:0;

background:black;

display:flex;
align-items:center;
justify-content:center;

z-index:10;

animation:fadeOut 1s ease 3s forwards;

}

#intro h1{

font-size:2.8rem;
letter-spacing:3px;
text-align:center;

animation:zoom 2s ease;

}

/* CONTENIDO */

.container{

text-align:center;

opacity:0;

animation:showContent 1s ease 3.2s forwards;

}

/* CENTRO */

.center{

position:relative;

width:420px;
height:420px;

margin:auto;

}

/* TEXTO CENTRAL */

.center-text{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:1.8rem;

font-weight:600;

}

/* NODOS */

.node{

position:absolute;

width:120px;

padding:12px;

background:#1b1b1b;

border-radius:10px;

border:2px solid;

cursor:pointer;

transition:.3s;

}

.node:hover{

transform:scale(1.1);

}

/* COLORES */

.streaming{border-color:#e50914;}
.web{border-color:#1e90ff;}
.tarjetas{border-color:#00c853;}
.invitaciones{border-color:#ff9800;}
.office{border-color:#9c27b0;}

/* POSICIONES CIRCULO */

.n1{top:0;left:50%;transform:translateX(-50%);}
.n2{top:25%;right:0;}
.n3{bottom:25%;right:0;}
.n4{bottom:0;left:50%;transform:translateX(-50%);}
.n5{top:25%;left:0;}

/* BOTON */

button{

margin-top:40px;

padding:14px 45px;

border:none;

border-radius:25px;

background:#e50914;

color:white;

font-size:1rem;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

/* ANIMACIONES */

@keyframes fadeOut{

to{
opacity:0;
visibility:hidden;
}

}

@keyframes zoom{

from{
transform:scale(.5);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

@keyframes showContent{

to{
opacity:1;
}

}

/* RESPONSIVE */

@media(max-width:600px){

.center{

width:300px;
height:300px;

}

.node{

width:95px;
font-size:.8rem;

}

.center-text{

font-size:1.4rem;

}

}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">

<h1>Cuentas Premium<br>Betoko_132204</h1>

</div>

<!-- CONTENIDO -->

<div class="container">

<div class="center">

<div class="center-text">Bienvenido</div>

<div class="node streaming n1">Streaming</div>

<div class="node web n2">Páginas Web</div>

<div class="node tarjetas n3">Tarjetas</div>

<div class="node invitaciones n4">Invitaciones</div>

<div class="node office n5">Office</div>

</div>

<button onclick="entrar()">Entrar</button>

</div>

<script>

function entrar(){

window.location.href="https://betoko1322.github.io/cuentaspremiumbetoko132204/principal.html";

}

</script>

</body>
</html>
