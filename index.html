<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenido</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

/* FONDO */

body{
min-height:100vh;
background:url("https://img.freepik.com/vector-gratis/diseno-futurista-fondo_23-2148503793.jpg?semt=ais_hybrid&w=740&q=80")
center/cover fixed;
color:white;
}

/* OVERLAY CRISTAL */

#overlay{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;

background:rgba(0,0,0,0.25);
backdrop-filter:blur(6px);
}

/* CONTENEDOR MAPA */

#mapa{
position:relative;
width:100%;
max-width:1100px;
height:600px;
}

/* TEXTO CENTRAL */

#centro{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:3;
}

#centro h1{
font-size:2.7rem;
margin-bottom:10px;
}

#centro p{
opacity:.85;
}

/* NODOS ESTILO VIDRIO */

.nodo{

position:absolute;
width:22px;
height:22px;

background:rgba(255,255,255,0.35);
border-radius:50%;

backdrop-filter:blur(6px);
border:1px solid rgba(255,255,255,0.4);

box-shadow:
0 0 15px rgba(255,255,255,0.4),
inset 0 0 6px rgba(255,255,255,0.4);

animation:pulse 3s infinite;
}

/* TEXTO NODOS */

.nodo span{

position:absolute;
top:-42px;
left:50%;
transform:translateX(-50%);

font-size:1rem;
font-weight:600;

color:white;

background:rgba(255,255,255,0.15);
padding:6px 10px;
border-radius:8px;

backdrop-filter:blur(5px);
border:1px solid rgba(255,255,255,0.3);

white-space:nowrap;

}

/* POSICIONES */

#n-streaming{ top:18%; left:20%; }
#n-web{ top:18%; right:20%; }
#n-tarjetas{ bottom:18%; left:20%; }
#n-invitaciones{ bottom:18%; right:20%; }
#n-office{ top:50%; right:8%; }

/* LINEAS */

svg{
position:absolute;
inset:0;
width:100%;
height:100%;
}

line{
stroke:rgba(255,255,255,0.6);
stroke-width:1.5;
stroke-dasharray:6;
animation:linea 6s linear infinite;
}

/* BOTON */

#btn-entrar{

position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);

padding:14px 45px;
font-size:1rem;

border-radius:40px;
border:1px solid rgba(255,255,255,0.4);

background:rgba(255,255,255,0.2);
color:white;

backdrop-filter:blur(6px);

cursor:pointer;
transition:.3s;

}

#btn-entrar:hover{

background:rgba(255,255,255,0.35);
transform:translateX(-50%) scale(1.08);

}

/* ANIMACIONES */

@keyframes pulse{

0%{box-shadow:0 0 8px rgba(255,255,255,0.4);}
50%{box-shadow:0 0 20px rgba(255,255,255,0.8);}
100%{box-shadow:0 0 8px rgba(255,255,255,0.4);}

}

@keyframes linea{
to{stroke-dashoffset:-100;}
}

/* RESPONSIVE */

@media(max-width:700px){

#mapa{
height:auto;
display:flex;
flex-direction:column;
align-items:center;
}

svg{
display:none;
}

#centro{
position:relative;
transform:none;
left:auto;
top:auto;
margin-bottom:40px;
}

.nodo{
position:relative;
margin:40px 0;
}

.nodo span{
position:relative;
top:-25px;
transform:none;
text-align:center;
}

#n-streaming,
#n-web,
#n-tarjetas,
#n-invitaciones,
#n-office{
top:auto;
left:auto;
right:auto;
bottom:auto;
}

#btn-entrar{
position:relative;
left:auto;
bottom:auto;
transform:none;
margin-top:40px;
width:80%;
max-width:250px;
}

}

</style>
</head>

<body>

<div id="overlay">

<div id="mapa">

<div id="centro">
<h1>Bienvenido</h1>
<p>Selecciona uno de nuestros servicios</p>
</div>

<svg>
<line x1="50%" y1="50%" x2="20%" y2="20%"/>
<line x1="50%" y1="50%" x2="80%" y2="20%"/>
<line x1="50%" y1="50%" x2="20%" y2="80%"/>
<line x1="50%" y1="50%" x2="80%" y2="80%"/>
<line x1="50%" y1="50%" x2="92%" y2="50%"/>
</svg>

<div class="nodo" id="n-streaming">
<span>Plataformas Streaming</span>
</div>

<div class="nodo" id="n-web">
<span>Páginas Web</span>
</div>

<div class="nodo" id="n-tarjetas">
<span>Tarjetas Digitales</span>
</div>

<div class="nodo" id="n-invitaciones">
<span>Invitaciones Digitales</span>
</div>

<div class="nodo" id="n-office">
<span>Activación Office</span>
</div>

<button id="btn-entrar" onclick="entrar()">Entrar</button>

</div>

</div>

<script>

function entrar(){
window.location.href="https://betoko1322.github.io/cuentaspremiumbetoko132204/principal.html";
}

</script>

</body>
</html>
